server {
    listen 80;
    server_name _;
    
    # Enable error logging
    error_log /var/log/nginx/error.log debug;
    access_log /var/log/nginx/access.log;
    
    # API proxy - handle /api requests (with trailing slash)
    location /api/ {
        # Proxy to backend API - keep the /api/ path
        proxy_pass https://win-station-api.fly.dev/api/;
        
        # HTTP version
        proxy_http_version 1.1;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Pass original headers - IMPORTANT: Use the backend hostname for SSL verification
        proxy_set_header Host https://win-station-api.fly.dev;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        
        # SSL verification - trust Fly.io SSL certificates
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_ssl_verify off;
        
        # DNS resolver - use Fly.io internal DNS
        resolver 169.254.169.254 1.1.1.1 valid=10s;
        resolver_timeout 5s;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Don't cache
        proxy_cache_bypass $http_upgrade;
        proxy_no_cache 1;
        
        # Buffer settings
        proxy_buffering off;
        
        # Enable redirects
        proxy_redirect off;
    }
    
    # Handle /api without trailing slash (redirect to /api/)
    location = /api {
        return 301 /api/;
    }
    
    # SPA routes - serve static files and fallback to index.html
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
        
        # Security headers
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";
    }
}